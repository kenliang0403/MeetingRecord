<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="csrf-token" content="{{ csrf_token() }}">
<title>{% block title %}Recorder Admin{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script>
  // 全局 helper：JS fetch POST/PUT/DELETE 调用统一从 meta 读 CSRF token。
  // 用法：fetch(url, { method:'POST', headers: window.csrfHeaders(), body: ... })
  //      JSON body 时：headers: { ...window.csrfHeaders(), 'Content-Type': 'application/json' }
  window.csrfToken = () => {
    const m = document.querySelector('meta[name="csrf-token"]');
    return m ? m.getAttribute('content') : '';
  };
  window.csrfHeaders = () => ({ 'X-CSRFToken': window.csrfToken() });
</script>
{% block head %}{% endblock %}
</head>
<body>
{% if session.user %}
<nav class="topnav">
  <a href="{{ url_for('dashboard') }}" class="brand">Recorder</a>
  <a href="{{ url_for('dashboard')      }}">状态</a>
  <a href="{{ url_for('live_page')      }}">直播</a>
  <a href="{{ url_for('config_page')    }}">配置</a>
  <a href="{{ url_for('recordings_page')}}">回放</a>
  <span class="spacer"></span>
  <span class="user">{{ session.user }}</span>
  <a href="{{ url_for('logout') }}" class="logout">登出</a>
</nav>
{% endif %}

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="flash-area">
      {% for cat, msg in messages %}
        <div class="flash flash-{{cat}}">{{msg}}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<main>
{% block body %}{% endblock %}
</main>
</body>
</html>
