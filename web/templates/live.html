{% extends "base.html" %}
{% block title %}直播 — Recorder Admin{% endblock %}
{% block head %}
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
{% endblock %}
{% block body %}
<h2>直播</h2>

<div class="play-stage" id="live-stage">
  <video id="live-primary"   controls muted playsinline autoplay></video>
  <video id="live-secondary"        muted playsinline autoplay></video>
  <!-- 占位提示层 — 无信号时显示 -->
  <div class="stage-overlay" id="live-overlay-primary"></div>
  <div class="stage-overlay overlay-secondary" id="live-overlay-secondary"></div>
  <!-- ASR 字幕条（推流时显示，无字幕时隐藏） -->
  <div class="live-caption" id="live-caption" data-final=""></div>
</div>

<div class="play-bar">
  <div class="play-bar-row">
    <span class="play-bar-title">布局</span>
    <div class="layout-segments" id="live-layout-segments">
      <button type="button" data-layout="main-only" class="active">仅主流</button>
      <button type="button" data-layout="aux-only">仅辅流</button>
      <button type="button" data-layout="pip">画中画</button>
      <button type="button" data-layout="split">左右分屏</button>
    </div>
    <button type="button" id="live-swap-btn" class="btn btn-link" disabled
            title="把当前小窗 / 右侧画面提到大画面 / 左侧">⇄ 主画面切换</button>
    <label class="cap-toggle" title="显示/隐藏字幕（保存到浏览器本地）">
      <input type="checkbox" id="live-cap-toggle" checked>
      <span>显示字幕</span>
    </label>
    <label class="cap-delay" title="字幕推后秒数；改完点【应用】才生效">
      <span>字幕延迟</span>
      <input type="number" id="live-cap-delay" min="0" max="20" step="0.5" value="4">
      <button type="button" id="live-cap-delay-apply" class="btn btn-link" style="padding:2px 8px;">应用</button>
      <span class="muted">秒</span>
    </label>
    <span class="play-bar-name" id="live-msg"></span>
  </div>
</div>

<script>
  const SRS_BASE = "{{ srs_base }}";
  const MAIN_KEY = "{{ main_stream }}";
  const AUX_KEY  = "{{ aux_stream }}";
</script>
<script src="{{ url_for('static', filename='live.js') }}"></script>
{% endblock %}
